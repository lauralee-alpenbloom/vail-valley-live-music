const ALL_SERIES = ["Amp Summer Concert", "AvonLIVE!", "BC Arts Festival", "BC Oktoberfest", "BC Unplugged", "Bravo! Vail", "Colorado Showcase", "Creekside Park Concerts", "Hot Summer Nights", "Independence Day Celebration", "Minturn Concert Series", "Mountains of Music / GoPro", "ShowDown Town", "SunsetLIVE!", "Vail Summer Sessions", "Vilar Performing Arts Center"];
const ALL_TOWNS  = ["Avon", "Beaver Creek", "Eagle", "Minturn", "Vail"];
const TODAY = '2026-06-01';

const townSel   = document.getElementById('townFilter');
const seriesSel = document.getElementById('seriesFilter');
ALL_TOWNS.forEach(t  => { const o=document.createElement('option'); o.value=o.textContent=t;  townSel.appendChild(o); });
ALL_SERIES.forEach(s => { const o=document.createElement('option'); o.value=o.textContent=s; seriesSel.appendChild(o); });

let upcomingOnly = true;

function toggleUpcoming() {
  upcomingOnly = !upcomingOnly;
  document.getElementById('upcomingToggle').classList.toggle('on', upcomingOnly);
  render();
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('townFilter').value   = '';
  document.getElementById('seriesFilter').value = '';
  document.getElementById('paidFilter').value   = '';
  upcomingOnly = true;
  document.getElementById('upcomingToggle').classList.add('on');
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const town   = document.getElementById('townFilter').value;
  const series = document.getElementById('seriesFilter').value;
  const paid   = document.getElementById('paidFilter').value;

  const filtered = ALL_EVENTS.filter(e => {
    if (upcomingOnly && e.date < TODAY) return false;
    if (search && !`${e.artist} ${e.series} ${e.venue} ${e.notes}`.toLowerCase().includes(search)) return false;
    if (town   && e.town   !== town)   return false;
    if (series && e.series !== series) return false;
    if (paid   && e.paid   !== paid)   return false;
    return true;
  });

  const base  = upcomingOnly ? ALL_EVENTS.filter(e => e.date >= TODAY).length : ALL_EVENTS.length;
  document.getElementById('count').textContent = `${filtered.length} of ${base} events`;

  const container = document.getElementById('events');
  if (!filtered.length) {
    container.innerHTML = '<div class="no-results">No events match your filters.</div>';
    return;
  }

  const groups = {};
  filtered.forEach(e => { if (!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });

  const DAYS   = {Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};
  const MONTHS = {Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',
                  Jul:'July',Aug:'August',Sep:'September',Oct:'October',Nov:'November',Dec:'December'};

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    const evs   = groups[date];
    const e0    = evs[0];
    const isPast = date < TODAY;
    const label  = `${DAYS[e0.dow]||e0.dow}, ${MONTHS[e0.month]||e0.month} ${e0.day}`;
    html += `<div class="date-label${isPast?' past-date':''}">${label}</div>`;
    evs.forEach(e => {
      const isFree = e.paid === 'Free';
      html += `
        <div class="event-card ${isFree?'free-card':'paid-card'}${e.url?' has-url':''}${date<TODAY?' past':''}"
             ${e.url?`onclick="window.open('${e.url}','_blank')"`:''}>
          <div class="card-main">
            <div class="card-artist">${e.artist || e.series}</div>
            ${e.series && e.artist ? `<div class="card-series">${e.series}</div>` : ''}
            <div class="card-venue">${e.venue}, ${e.town}</div>
          </div>
          <div class="card-right">
            <span class="badge ${isFree?'badge-free':'badge-paid'}">${e.paid}</span>
            ${e.time ? `<div class="card-time">${e.time}</div>` : ''}
            ${e.url  ? `<a class="more-link" href="${e.url}" target="_blank" onclick="event.stopPropagation()">More info</a>` : ''}
          </div>
        </div>`;
    });
  });

  container.innerHTML = html;
}

render();
</script>
